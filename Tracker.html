<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expense Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./Tracker.css" />
  </head>

  <body>

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="header-icon">💰</div>
        <span class="header-title">Expense Tracker</span>
      </div>
      <div class="header-right">
        <div class="user-avatar">👤</div>
        <span class="user-name">Hello, <span id="headerUsername">User</span> ▾</span>
        <!-- <button class="logout-btn" onclick="logoutUser()">Logout</button> -->
      </div>
    </div>

    <!-- Input Form -->
    <div class="input-form">
      <div class="form-floating inputs">
        <input type="date" class="form-control dateInput" id="dateInput" placeholder="dd-mm-yyyy" />
        <label for="dateInput">Date</label>
      </div>
      <div class="form-floating inputs">
        <input type="number" class="form-control amountInput" id="amountInput" placeholder="Enter amount" />
        <label for="amountInput">Amount</label>
      </div>
      <div class="form-floating inputs">
        <select class="form-select transactionType" id="transactionType">
          <option selected disabled value="">Choose Type</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
        <label for="transactionType">Transaction Type</label>
      </div>
      <button class="btn add-btn" id="add-button" onclick="addRow()">+</button>
    </div>

    <!-- Summary Cards -->
    <div class="cards mt-4">
      <div class="summary-card income-card">
        <div class="card-icon income-icon">💼</div>
        <div class="card-info">
          <p class="card-label">Total Income</p>
          <h2 class="card-amount income-amount">₹ <span id="totalIncome">0</span></h2>
        </div>
        <div class="card-trend income-trend">↗</div>
      </div>
      <div class="summary-card expense-card">
        <div class="card-icon expense-icon">👛</div>
        <div class="card-info">
          <p class="card-label">Total Expense</p>
          <h2 class="card-amount expense-amount">₹ <span id="expense">0</span></h2>
        </div>
        <div class="card-trend expense-trend">↗</div>
      </div>
      <div class="summary-card balance-card">
        <div class="card-icon balance-icon">💰</div>
        <div class="card-info">
          <p class="card-label">Balance</p>
          <h2 class="card-amount balance-amount">₹ <span id="balance">0</span></h2>
        </div>
        <div class="card-trend balance-trend">↗</div>
      </div>
    </div>

    <!-- Generate Report Button -->
    <div class="report-btn-wrapper mt-3">
      <button class="btn generate-report-btn" onclick="generateReport()">
        <span class="report-icon">📊</span> Generate Report
      </button>
    </div>

    <!-- Transaction Table -->
    <table class="transaction-table mt-3" id="table">
      <tr id="header-row">
        <th>Amount</th>
        <th>Transaction Type</th>
        <th>Transaction Date</th>
        <th>Action</th>
      </tr>
    </table>

    <script>
      const table = document.getElementById("table");
      let currentUser = "";  // set on load

      /* ══════════════════════════════════════════
         PAGE LOAD
      ══════════════════════════════════════════ */
      window.onload = function () {
        // Guard: if not logged in, go back to login
        currentUser = localStorage.getItem("et_currentUser");
        if (!currentUser) {
          window.location.href = "index.html";
          return;
        }

        // Show username in header
        document.getElementById("headerUsername").innerText = currentUser;

        // Load this user's saved totals (0 if never saved)
        const income  = parseInt(localStorage.getItem("et_totalIncome_"  + currentUser)) || 0;
        const expense = parseInt(localStorage.getItem("et_totalExpense_" + currentUser)) || 0;
        const balance = parseInt(localStorage.getItem("et_balance_"      + currentUser)) || 0;

        document.getElementById("totalIncome").innerText = formatNumber(income);
        document.getElementById("expense").innerText     = formatNumber(expense);
        document.getElementById("balance").innerText     = formatNumber(balance);

        // Restore transaction rows from localStorage
        const saved = localStorage.getItem("et_transactions_" + currentUser);
        if (saved) {
          const transactions = JSON.parse(saved);
          transactions.forEach(tx => renderRow(tx.amount, tx.type, tx.date));
        }
      };

      /* ══════════════════════════════════════════
         STORAGE HELPERS  (per-user keys)
      ══════════════════════════════════════════ */
      function saveTotals(income, expense, balance) {
        localStorage.setItem("et_totalIncome_"  + currentUser, income);
        localStorage.setItem("et_totalExpense_" + currentUser, expense);
        localStorage.setItem("et_balance_"      + currentUser, balance);
      }

      function getTransactions() {
        const raw = localStorage.getItem("et_transactions_" + currentUser);
        return raw ? JSON.parse(raw) : [];
      }

      function saveTransactions(arr) {
        localStorage.setItem("et_transactions_" + currentUser, JSON.stringify(arr));
      }

      /* ══════════════════════════════════════════
         FORMATTING
      ══════════════════════════════════════════ */
      function formatNumber(num) {
        return num.toLocaleString("en-IN");
      }

      function parseDisplayed(id) {
        return parseInt(document.getElementById(id).innerText.replace(/,/g, "")) || 0;
      }

      function formatDate(dateStr) {
        if (!dateStr) return "";
        const [y, m, d] = dateStr.split("-");
        return `${d}-${m}-${y}`;
      }

      /* ══════════════════════════════════════════
         RENDER A ROW  (used by addRow + restore)
      ══════════════════════════════════════════ */
      function renderRow(amountNum, type, displayDate) {
        const row = document.createElement("tr");

        const amountCell = document.createElement("td");
        amountCell.classList.add(type === "income" ? "amount-income" : "amount-expense");
        amountCell.innerText = "₹ " + formatNumber(amountNum);

        const transactionCell = document.createElement("td");
        const badge = document.createElement("span");
        badge.innerText = type.charAt(0).toUpperCase() + type.slice(1);
        badge.classList.add("type-badge", type === "income" ? "badge-income" : "badge-expense");
        transactionCell.appendChild(badge);

        const dateCell = document.createElement("td");
        dateCell.innerText = displayDate;

        const binCell = document.createElement("td");
        const deleteButton = document.createElement("button");
        deleteButton.innerHTML = "🗑";
        deleteButton.classList.add("delete-button");
        deleteButton.onclick = () => deleteRow(row, amountNum, type, displayDate);
        binCell.appendChild(deleteButton);

        row.appendChild(amountCell);
        row.appendChild(transactionCell);
        row.appendChild(dateCell);
        row.appendChild(binCell);
        table.appendChild(row);
      }

      /* ══════════════════════════════════════════
         ADD ROW
      ══════════════════════════════════════════ */
      function addRow() {
        const date            = document.getElementById("dateInput").value;
        const amount          = document.getElementById("amountInput").value;
        const transactionType = document.getElementById("transactionType").value;

        if (!date || !amount || !transactionType) {
          alert("Please fill in all fields.");
          return;
        }

        const amountNum   = parseInt(amount);
        const displayDate = formatDate(date);

        // Render the row
        renderRow(amountNum, transactionType, displayDate);

        // Update totals
        let income  = parseDisplayed("totalIncome");
        let expense = parseDisplayed("expense");
        let balance = parseDisplayed("balance");

        if (transactionType === "income") {
          income  += amountNum;
          balance += amountNum;
        } else {
          expense += amountNum;
          balance -= amountNum;
        }

        document.getElementById("totalIncome").innerText = formatNumber(income);
        document.getElementById("expense").innerText     = formatNumber(expense);
        document.getElementById("balance").innerText     = formatNumber(balance);

        saveTotals(income, expense, balance);

        // Save transaction to localStorage
        const transactions = getTransactions();
        transactions.push({ amount: amountNum, type: transactionType, date: displayDate });
        saveTransactions(transactions);

        // Clear inputs
        document.getElementById("amountInput").value     = "";
        document.getElementById("dateInput").value       = "";
        document.getElementById("transactionType").value = "";
      }

      /* ══════════════════════════════════════════
         DELETE ROW
      ══════════════════════════════════════════ */
      function deleteRow(row, amountNum, type, displayDate) {
        let income  = parseDisplayed("totalIncome");
        let expense = parseDisplayed("expense");
        let balance = parseDisplayed("balance");

        if (type === "income") {
          income  -= amountNum;
          balance -= amountNum;
        } else {
          expense -= amountNum;
          balance += amountNum;
        }

        document.getElementById("totalIncome").innerText = formatNumber(income);
        document.getElementById("expense").innerText     = formatNumber(expense);
        document.getElementById("balance").innerText     = formatNumber(balance);

        saveTotals(income, expense, balance);

        // Remove from saved transactions
        const transactions = getTransactions();
        const idx = transactions.findIndex(
          tx => tx.amount === amountNum && tx.type === type && tx.date === displayDate
        );
        if (idx !== -1) transactions.splice(idx, 1);
        saveTransactions(transactions);

        row.remove();
      }

      /* ══════════════════════════════════════════
         GENERATE REPORT
      ══════════════════════════════════════════ */
      function generateReport() {
        const rows = table.querySelectorAll("tr:not(#header-row)");
        if (rows.length === 0) {
          alert("No transactions to generate report.");
          return;
        }
        window.location.href = "report.html";
      }

      /* ══════════════════════════════════════════
         LOGOUT  (defined in auth.js, called here)
      ══════════════════════════════════════════ */
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"></script>
    <script src="auth.js"></script>
  </body>
</html>
