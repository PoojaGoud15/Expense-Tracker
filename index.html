<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expense Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./Home.css" />
  </head>

  <body>
    <div class="parent">
      <div class="solid-circle"></div>
      <div class="header-home">
        <h5 class="m-0">
          Expense Tracker
          <img src="./spending.png" alt="" width="35px" height="35px" />
        </h5>
        <div class="signup-section">
          <span id="new-user-text">New here?</span>
          <a href="./signup.html">
            <button class="btn btn-md" id="click-here-button">Sign Up</button>
          </a>
        </div>
      </div>

      <div class="main-content">
        <h2 class="main-content-text">
          Welcome Back
          <img src="./wave.png" alt="" width="35px" />
          <br />
          <small>Manage your expenses with ease</small>
          <br />
          <span id="Name">Login</span>
        </h2>

        <!-- Inline error message -->
        <p id="errorMsg" style="color:#dc2626; font-size:0.85rem; margin-bottom:10px; display:none;"></p>

        <!-- Username -->
        <div class="form-floating mb-3">
          <input
            type="text"
            class="form-control"
            id="loginUsername"
            placeholder="Username"
            onkeydown="if(event.key==='Enter') loginUser()"
          />
          <label for="loginUsername">Username</label>
        </div>

        <!-- Password -->
        <div class="form-floating mb-3">
          <input
            type="password"
            class="form-control"
            id="loginPassword"
            placeholder="Password"
            onkeydown="if(event.key==='Enter') loginUser()"
          />
          <label for="loginPassword">Password</label>
        </div>

        <button class="btn btn-sm" id="login-button" onclick="loginUser()">
          Login
        </button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"></script>
    <script src="auth.js"></script>
  </body>
</html>
