<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign Up - Expense Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./Home.css" />
  </head>

  <body>
    <div class="parent">
      <div class="solid-circle"></div>

      <!-- Header -->
      <div class="header-home">
        <h5 class="m-0">
          Expense Tracker
          <img src="./spending.png" width="35" height="35" />
        </h5>
        <div class="signup-section">
          <span id="new-user-text">Already have an account?</span>
          <a href="./index.html">
            <button class="btn btn-md" id="click-here-button">Login</button>
          </a>
        </div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <h2 class="main-content-text">
          Create Your Account 🎉
          <br />
          <small>Join us and start managing your expenses!</small>
          <br />
          <span id="Name">Sign Up</span>
        </h2>

        <!-- Inline error message -->
        <p id="errorMsg" style="color:#dc2626; font-size:0.85rem; margin-bottom:10px; display:none;"></p>

        <!-- Username -->
        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="username" placeholder="Username" />
          <label for="username">Username</label>
        </div>

        <!-- Email -->
        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="email" placeholder="Email" />
          <label for="email">Email Address</label>
        </div>

        <!-- Password -->
        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="password" placeholder="Password" />
          <label for="password">Password</label>
        </div>

        <!-- Confirm Password -->
        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" />
          <label for="confirmPassword">Confirm Password</label>
        </div>

        <button class="btn btn-sm" id="login-button" onclick="registerUser()">
          Create Account
        </button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
